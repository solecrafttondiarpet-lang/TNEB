<header class="header">
  <div class="header-container container">
    <a routerLink="/" class="logo">
      <img src="logo.png" alt="TNA WEB Logo" class="logo-img">
    </a>
    
    <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen()">
      <span></span><span></span><span></span>
    </button>

    <nav class="nav-links" [class.open]="isMenuOpen()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="hover-lift" (click)="closeMenu()">Home</a>
      <a routerLink="/about" routerLinkActive="active" class="hover-lift" (click)="closeMenu()">About</a>
      <a routerLink="/services" routerLinkActive="active" class="hover-lift" (click)="closeMenu()">Services</a>
      <a routerLink="/portfolio" routerLinkActive="active" class="hover-lift" (click)="closeMenu()">Portfolio</a>
      <a routerLink="/contact" routerLinkActive="active" class="hover-lift" (click)="closeMenu()">Contact</a>
    </nav>
  </div>
</header>
